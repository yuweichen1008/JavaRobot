version: '3.9'

services:
  server:
    build: ./server
    ports:
      - '8080:8080'
    environment:
      PORT: '8080'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/api/v1/robot/status']
      interval: 10s
      timeout: 5s
      retries: 3

  webapp:
    build: ./webapp
    ports:
      - '3000:80'
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
